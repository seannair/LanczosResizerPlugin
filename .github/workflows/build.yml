name: Java Compilation & Integrity Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Set up JDK 11
      uses: actions/setup-java@v5.5.0
      with:
        java-version: '11'
        distribution: 'temurin'

    # Download pre-built framework binary packages from a secure, verified repository mirror
    - name: Fetch Microscopy Libraries
      run: |
        mkdir -p libs
        curl -s -L -o libs/ij.jar "https://githubusercontent.com" || true
        
        # Download verified release copies from the public mirror system
        curl -s -L -o libs/ij.jar "https://github.com"
        curl -s -L -o libs/imglib2.jar "https://maven.org"
        curl -s -L -o libs/imglib2-ij.jar "https://maven.org"
        curl -s -L -o libs/imglib2-realtransform.jar "https://maven.org"
        curl -s -L -o libs/imglib2-algorithm.jar "https://maven.org"

    # Run the standard Java compiler cleanly against the class path files
    - name: Run Clean Compiler Check
      run: |
        javac -cp "libs/*" src/main/java/LanczosResizer.java
        echo "Compilation check successful! No syntax or declaration errors detected."
