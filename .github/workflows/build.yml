name: Java Compilation & Integrity Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Set up JDK 11
      uses: actions/setup-java@v5.5.0
      with:
        java-version: '11'
        distribution: 'temurin'

    # This cleanly downloads ImageJ and ImgLib2 without broken links
    - name: Fetch Dependencies via Maven Dependency Plugin
      run: |
        mkdir -p libs
        mvn dependency:get -DrepoUrl=https://scijava.org -Dartifact=net.imagej:ij:1.54g -Ddest=libs/ij.jar
        mvn dependency:get -DrepoUrl=https://scijava.org -Dartifact=net.imglib2:imglib2:6.1.0 -Ddest=libs/imglib2.jar
        mvn dependency:get -DrepoUrl=https://scijava.org -Dartifact=net.imglib2:imglib2-ij:2.0.0-beta-46 -Ddest=libs/imglib2-ij.jar
        mvn dependency:get -DrepoUrl=https://scijava.org -Dartifact=net.imglib2:imglib2-algorithm:0.13.0 -Ddest=libs/imglib2-algorithm.jar

    - name: Compile Java Code
      run: |
        javac -cp "libs/*" LanczosResizer.java
        echo "Compilation check successful! No syntax or declaration errors detected."
