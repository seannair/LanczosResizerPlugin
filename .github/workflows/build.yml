name: Java Compilation & Integrity Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v5.5.0
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Fetch ImageJ and ImgLib2 Dependencies
      run: |
        mkdir -p libs
        curl -L -o libs/ij.jar "https://scijava.org"
        curl -L -o libs/imglib2.jar "https://scijava.org"
        curl -L -o libs/imglib2-ij.jar "https://scijava.org"
        curl -L -o libs/imglib2-algorithm.jar "https://scijava.org"

    - name: Compile Java Code
      run: |
        javac -cp "libs/*" LanczosResizer.java
        echo "Compilation check successful! No syntax or declaration errors detected."
