name: Java Compilation & Integrity Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Set up JDK 11
      uses: actions/setup-java@v5.5.0
      with:
        java-version: '11'
        distribution: 'temurin'

    # Download verified framework archives directly from the central storage mirrors
    - name: Download Verified Library Bundles
      run: |
        mkdir -p libs
        curl -L -o libs/ij.jar "https://maven.org"
        curl -L -o libs/imglib2.jar "https://maven.org"
        curl -L -o libs/imglib2-ij.jar "https://maven.org"
        curl -L -o libs/imglib2-realtransform.jar "https://maven.org"
        curl -L -o libs/imglib2-algorithm.jar "https://maven.org"

    # Compile the file directly from its folder path
    - name: Direct Classpath Compilation Check
      run: |
        javac -cp "libs/*" src/main/java/LanczosResizer.java
        echo "Compilation check successful! No syntax or declaration errors detected."
