name: Java Compilation & Integrity Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Set up JDK 11
      uses: actions/setup-java@v5.5.0
      with:
        java-version: '11'
        distribution: 'temurin'

    # Securely download packages using Maven's own internal download system
    - name: Fetch Verified Dependencies Natively
      run: mvn dependency:copy-dependencies -DoutputDirectory=libs

    # Compile the file directly from its folder path using the clean downloads
    - name: Direct Classpath Compilation Check
      run: |
        javac -cp "libs/*" src/main/java/LanczosResizer.java
        echo "Compilation check successful! No syntax or declaration errors detected."
