name: Java Compilation & Integrity Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down your code
    - name: Checkout Repository
      uses: actions/checkout@v5

    # 2. Open up a clean Java 11 environment
    - name: Set up JDK 11
      uses: actions/setup-java@v5.5.0
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Clean up any broken folders left from previous runs
    - name: Clean Environment
      run: rm -rf libs target

    # 4. Use GitHub's native project compiler
    # This automatically downloads and builds the code using your project settings
    - name: Compile with Maven Natively
      run: mvn -B clean test-compile
